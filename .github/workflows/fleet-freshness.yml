name: Fleet Freshness Monitor

# Detects when any data-driven factory site has gone stale (>48h since the
# cron-generated data was last refreshed). Opens or updates a tracking issue
# in this repo when a site falls behind, closes it when freshness returns.
#
# Why 06:00 UTC: the latest data-gen + deploy chain finishes by ~05:47 UTC
# (deploy-shared-pages-sites runs at 05:45, build+deploy takes ~2 min).
# Why 48h threshold: 36h was too tight — one missed cron run (GH Actions
# outage, runner congestion) puts data at 48h+ before the next succeeds.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: check
        name: Probe each site's freshness endpoint
        run: node scripts/check-fleet-freshness.mjs
        continue-on-error: true

      - name: Open / update / close tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTCOME: ${{ steps.check.outcome }}
          STALE: ${{ steps.check.outputs.stale }}
          COUNT: ${{ steps.check.outputs.count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create fleet-stale --color "d73a49" --description "Auto-opened by fleet-freshness workflow" --force 2>/dev/null || true

          existing=$(gh issue list --label fleet-stale --state open --json number -q '.[0].number // empty')

          if [ "$OUTCOME" = "failure" ]; then
            body=$(printf '%s\n' \
              "Fleet freshness monitor detected $COUNT stale site(s) on $(date -u +%Y-%m-%d):" \
              "" \
              "$STALE" \
              "" \
              "Workflow run: $RUN_URL")
            if [ -n "$existing" ]; then
              echo "Issue #$existing already open — adding comment"
              gh issue comment "$existing" --body "$body"
            else
              echo "Opening new tracking issue"
              gh issue create \
                --title "Fleet freshness: $COUNT stale site(s) on $(date -u +%Y-%m-%d)" \
                --label fleet-stale \
                --body "$body"
            fi
            exit 1
          else
            if [ -n "$existing" ]; then
              echo "Freshness restored — closing issue #$existing"
              gh issue comment "$existing" --body "Freshness restored on $(date -u +%Y-%m-%d). Auto-closing."
              gh issue close "$existing"
            else
              echo "All sites fresh, no open issue."
            fi
          fi
